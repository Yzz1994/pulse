name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        run: cd web/panel && bun install --frozen-lockfile && bun run build.ts

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/panel/dist/
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        component: [server, node]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download frontend dist
        if: matrix.component == 'server'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/panel/dist/

      - name: Build release package
        run: |
          version="${GITHUB_REF_NAME:-dev}"
          make package-${{ matrix.component }} \
            TARGET_OS=linux \
            TARGET_ARCH=${{ matrix.arch }} \
            VERSION=${version} \
            SKIP_SPA=1

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.component }}-linux-${{ matrix.arch }}
          path: dist/release/pulse-${{ matrix.component }}-linux-${{ matrix.arch }}.tar.gz
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: pulse-*
          path: dist/release/
          merge-multiple: true

      - name: Generate checksums
        run: cd dist/release && sha256sum *.tar.gz > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.tar.gz
            dist/release/checksums.txt
