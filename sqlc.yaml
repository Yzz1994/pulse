version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/postgres/queries/"
    schema: "internal/store/postgres/schema/"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/store/postgres/sqlcgen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
        overrides:
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
